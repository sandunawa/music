<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: html_head('MelodyMart Admin | Inventory')}"></head>

<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <div class="section-header">
            <h1 class="section-title">Catalog Inventory Management</h1>
            <a th:href="@{/admin/inventory/add}" class="btn btn-primary" style="font-size: 0.85rem; padding: 0.5rem 1.25rem;">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">add_circle</span> Add Instrument
            </a>
        </div>

        <!-- Success/Error alert panels -->
        <div class="form-alert-success" th:if="${param.saved != null}">
            Instrument saved to repository.
        </div>
        <div class="form-alert-success" th:if="${param.deleted != null}">
            Instrument deleted from repository.
        </div>
        <div class="form-alert" th:if="${param.error != null}" th:text="${param.error}">
            An inventory error occurred.
        </div>

        <!-- Inventory Table Wrapper -->
        <div class="table-wrapper">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">Thumbnail</th>
                        <th>Product Details</th>
                        <th>Category</th>
                        <th>Retail Price</th>
                        <th>Rental Price</th>
                        <th style="text-align: center;">Stock</th>
                        <th style="text-align: center; width: 180px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td>
                            <img th:src="${product.imageUrl}" th:alt="${product.name}" 
                                 style="width: 50px; height: 35px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--border-color);"
                                 onerror="this.src='https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=100'">
                        </td>
                        <td>
                            <div style="font-weight: 600; color: var(--text-primary);" th:text="${product.name}">Instrument Name</div>
                            <span style="font-size: 0.75rem; color: var(--text-muted);" th:text="'Brand: ' + ${product.brand} + ' | ID: ' + ${product.id} + ' | Owner: ' + ${product.ownerName}">Brand & ID</span>
                        </td>
                        <td th:text="${product.category.displayName}">Category</td>
                        <td th:text="'$' + ${product.price}">$0.00</td>
                        <td th:text="'$' + ${product.rentalPricePerDay} + ' / day'" style="color: var(--accent-cyan);">$0.00 / day</td>
                        <td style="text-align: center;">
                            <span th:text="${product.stockQuantity}" 
                                  th:style="${product.stockQuantity > 0 ? 'color: var(--color-success); font-weight: 700;' : 'color: var(--color-danger); font-weight: 700;'}">0</span>
                        </td>
                        <td style="text-align: center;">
                            <div style="display: flex; gap: 0.5rem; justify-content: center;">
                                <!-- Edit -->
                                <a th:href="@{/admin/inventory/edit/{id}(id=${product.id})}" class="btn btn-secondary" style="font-size: 0.75rem; padding: 0.35rem 0.75rem; border-radius: var(--radius-sm);">
                                    <span class="material-symbols-outlined" style="font-size: 0.95rem;">edit</span> Edit
                                </a>

                                <!-- Delete Form -->
                                <form th:action="@{/admin/inventory/delete/{id}(id=${product.id})}" method="post" 
                                      onsubmit="return confirm('Are you sure you want to delete this instrument? This action cannot be undone.');">
                                    <button type="submit" class="btn btn-danger" style="font-size: 0.75rem; padding: 0.35rem 0.75rem; border-radius: var(--radius-sm);">
                                        <span class="material-symbols-outlined" style="font-size: 0.95rem;">delete</span> Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
