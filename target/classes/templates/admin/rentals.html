<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: html_head('All Rentals | MelodyMart Admin')}"></head>

<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <div class="section-header">
            <div>
                <h1 class="section-title">All Instrument Rentals</h1>
                <p style="color: var(--text-secondary); margin-top: 0.25rem;">Global log of active and completed leases</p>
            </div>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
                <span class="material-symbols-outlined">arrow_back</span> Back to Dashboard
            </a>
        </div>

        <div class="dashboard-card" style="margin-top: 2rem;">
            <div th:if="${rentals.isEmpty()}" style="padding: 2rem; text-align: center; color: var(--text-secondary);">
                No instruments have been rented out yet.
            </div>

            <div style="overflow-x: auto;" th:if="${!rentals.isEmpty()}">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">
                            <th style="padding: 1rem;">Rental ID</th>
                            <th style="padding: 1rem;">Customer ID</th>
                            <th style="padding: 1rem;">Instrument ID</th>
                            <th style="padding: 1rem;">Duration</th>
                            <th style="padding: 1rem;">Total Cost</th>
                            <th style="padding: 1rem;">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rental : ${rentals}" style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding: 1rem; font-family: monospace;" th:text="${rental.id}">ID</td>
                            <td style="padding: 1rem; font-size: 0.85rem;" th:text="${rental.userId}">User</td>
                            <td style="padding: 1rem; font-size: 0.85rem;" th:text="${rental.productId}">Product</td>
                            <td style="padding: 1rem;">
                                <div th:text="${rental.startDate} + ' to'">Start</div>
                                <div th:text="${rental.endDate}">End</div>
                            </td>
                            <td style="padding: 1rem; font-weight: 700; color: var(--accent-cyan);" th:text="'$' + ${rental.totalCost}">$0.00</td>
                            <td style="padding: 1rem;">
                                <span style="padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600;"
                                      th:styleappend="${rental.rentalStatus.name() == 'ACTIVE' ? 'color: var(--color-success); background-color: rgba(16, 185, 129, 0.1);' : 'color: var(--text-muted); background-color: var(--bg-surface-elevated);'}"
                                      th:text="${rental.rentalStatus}">STATUS</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
