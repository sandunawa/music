<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: html_head('All Orders | MelodyMart Admin')}"></head>

<body>
    <header th:replace="~{layout :: header}"></header>

    <main>
        <div class="section-header">
            <div>
                <h1 class="section-title">All Purchase Orders</h1>
                <p style="color: var(--text-secondary); margin-top: 0.25rem;">Global transaction ledger for sales</p>
            </div>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
                <span class="material-symbols-outlined">arrow_back</span> Back to Dashboard
            </a>
        </div>

        <div class="dashboard-card" style="margin-top: 2rem;">
            <div th:if="${orders.isEmpty()}" style="padding: 2rem; text-align: center; color: var(--text-secondary);">
                No orders have been placed yet.
            </div>

            <div style="overflow-x: auto;" th:if="${!orders.isEmpty()}">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">
                            <th style="padding: 1rem;">Order ID</th>
                            <th style="padding: 1rem;">Date</th>
                            <th style="padding: 1rem;">Customer ID</th>
                            <th style="padding: 1rem;">Total Amount</th>
                            <th style="padding: 1rem;">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}" style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding: 1rem; font-family: monospace;" th:text="${order.id}">ID</td>
                            <td style="padding: 1rem;" th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">Date</td>
                            <td style="padding: 1rem; font-size: 0.85rem;" th:text="${order.userId}">User</td>
                            <td style="padding: 1rem; font-weight: 700; color: var(--accent-cyan);" th:text="'$' + ${order.totalAmount}">$0.00</td>
                            <td style="padding: 1rem;">
                                <span style="padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; background-color: var(--bg-surface-elevated);"
                                      th:text="${order.status}">STATUS</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
